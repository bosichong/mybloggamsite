<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="16" fill="#212529"/>
  <!-- 手柄主体 -->
  <rect x="16" y="44" width="96" height="36" rx="6" fill="#e94560" stroke="#fff" stroke-width="2"/>
  <!-- 左握把 -->
  <rect x="6" y="52" width="14" height="20" rx="4" fill="#e94560" stroke="#fff" stroke-width="2"/>
  <!-- 右握把 -->
  <rect x="108" y="52" width="14" height="20" rx="4" fill="#e94560" stroke="#fff" stroke-width="2"/>
  <!-- 十字键 - 竖 -->
  <rect x="34" y="52" width="10" height="24" rx="2" fill="#fff"/>
  <!-- 十字键 - 横 -->
  <rect x="28" y="58" width="22" height="8" rx="2" fill="#fff"/>
  <!-- B 键 -->
  <circle cx="88" cy="58" r="8" fill="#fff"/>
  <circle cx="88" cy="58" r="5" fill="#e94560"/>
  <!-- A 键 -->
  <circle cx="106" cy="66" r="8" fill="#fff"/>
  <circle cx="106" cy="66" r="5" fill="#e94560"/>
  <!-- Select -->
  <rect x="50" y="66" width="8" height="4" rx="1" fill="#fff" opacity="0.7"/>
  <!-- Start -->
  <rect x="66" y="66" width="8" height="4" rx="1" fill="#fff" opacity="0.7"/>
  <!-- 指示灯 -->
  <rect x="58" y="48" width="12" height="4" rx="1" fill="#fff" opacity="0.5"/>
</svg>
